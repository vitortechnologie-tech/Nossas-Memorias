<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa Jornada ❤️</title>

<style>
body {
  margin: 0;
  background: #f1f5f9;
  font-family: Arial;
}

/* TOP */
.topo {
  background: #60a5fa;
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* MAPA */
.mapa {
  position: relative;
  padding: 40px 0;
}

/* LINHA */
.linha {
  position: absolute;
  left: 50%;
  width: 6px;
  background: #22c55e;
  height: 100%;
  transform: translateX(-50%);
}

/* NÍVEL */
.nivel {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  overflow: hidden;
  border: 4px solid white;
  position: relative;
  margin: 40px auto;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.nivel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.nivel:hover {
  transform: scale(1.1);
}

/* ZIGUE-ZAGUE */
.nivel:nth-child(odd) {
  margin-left: 20%;
}

.nivel:nth-child(even) {
  margin-right: 20%;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.caixa {
  background: white;
  color: black;
  border-radius: 20px;
  padding: 20px;
  max-width: 350px;
  text-align: center;
}

.caixa img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

  padding: 10px 20px;
