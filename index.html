<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa História ❤️</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

.container {
  max-width: 400px;
  padding: 20px;
}

img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 20px;
  display: none;
}

h1 {
  font-size: 22px;
  margin-bottom: 20px;
}

p {
  font-size: 18px;
  min-height: 80px;
  transition: opacity 0.5s;
}

button {
  padding: 12px 24px;
  margin-top: 20px;
  background-color: #22c55e;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #16a34a;
}

.fade {
  opacity: 0;
}
</style>

</head>

<body>

<div class="container">
  <h1>Nossa História 💙</h1>
  
  <img id="foto" src="">
  
  <p id="texto">Clique abaixo para começar...</p>
  
  <button onclick="proximo()">Avançar</button>
</div>

<script>

const historia = [
{
  texto: "Tudo começou de um jeito simples… mas sem a gente saber, já era o começo de tudo.",
  img: "foto1.jpg"
},
{
  texto: "Entre conversas, risadas e momentos… você foi se tornando minha pessoa favorita.",
  img: "foto2.jpg"
},
{
  texto: "A gente enfrentou dias difíceis… mas nunca pensei em desistir de nós.",
  img: "foto3.jpg"
},
{
  texto: "Com o tempo, você virou meu lugar seguro no mundo.",
  img: "foto4.jpg"
},
{
  texto: "E hoje, depois de tudo… eu tenho uma certeza:",
  img: "foto5.jpg"
},
{
  texto: "Eu não quero viver nenhum futuro que não tenha você.",
  img: ""
},
{
  texto: "Agora… fecha isso e vem me encontrar ❤️",
  img: ""
}
];

let etapa = 0;

function proximo() {
  const texto = document.getElementById("texto");
  const foto = document.getElementById("foto");

  texto.classList.add("fade");

  setTimeout(() => {
    texto.innerText = historia[etapa].texto;

    if (historia[etapa].img !== "") {
      foto.src = historia[etapa].img;
      foto.style.display = "block";
    } else {
      foto.style.display = "none";
    }

    texto.classList.remove("fade");

    etapa++;
    if (etapa >= historia.length) {
      etapa = historia.length - 1;
    }

  }, 300);
}

</script>

</body>
</html>
