<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa Jornada ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f1f5f9;
  font-family: 'Poppins', sans-serif;
  text-align: center;
}

/* TOPO */
.topo {
  background: #60a5fa;
  color: white;
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
}

/* MAPA */
.mapa {
  padding: 40px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* NÍVEL */
.nivel {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  overflow: hidden;
  margin: 25px 0;
  cursor: pointer;
  background: #e5e7eb;
  border: 4px solid white;
  box-shadow: 0 10px 20px rgba(0,0,0,0.25);
  transition: 0.3s;
  display: none;
}

/* primeiro aparece */
.nivel.ativo {
  display: block;
}

.nivel:hover {
  transform: scale(1.1);
}

.nivel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

/* CAIXA */
.caixa {
  background: white;
  padding: 25px;
  border-radius: 20px;
  max-width: 350px;
}

/* IMAGEM */
.caixa img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

/* TEXTO */
.caixa p {
  font-size: 18px;
  line-height: 1.6;
  white-space: pre-line;
  text-transform: uppercase;
}

/* BOTÃO */
button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

</style>

</head>

<body>

<div class="topo">
  NOSSA HISTÓRIA 💙
</div>

<div class="mapa" id="mapa"></div>

<div class="modal" id="modal">
  <div class="caixa">
    <img id="imgModal">
    <p id="textoModal"></p>
    <button onclick="fechar()">CONTINUAR</button>
  </div>
</div>

<script>

const dados = [

{ img:"foto1.jpeg", texto:`QUEM DIRIA QUE ESSA COWGIRL IRIA ENCONTRAR O SEU COWBOY TÃO CEDO` },

{ img:"foto2.jpeg", texto:`O COWBOYZÃO NÃO VIA A HORA DE TE ENCONTRAR 🤠` },

{ img:"foto3.jpeg", texto:`ENTRE TANTOS CAMINHOS...
A VIDA ENCONTROU UM JEITO DE CRUZAR A GENTE.` },

{ img:"foto4.jpeg", texto:`E SEM PERCEBER,
VOCÊ FOI SE TORNANDO TUDO PRA MIM.` },

{ img:"foto5.jpeg", texto:`NOS MOMENTOS SIMPLES...
NAS RISADAS...

FOI ONDE EU COMECEI A TER CERTEZA.` },

{ img:"foto6.jpeg", texto:`CADA MOMENTO COM VOCÊ
SEMPRE PARECEU ÚNICO.` },

{ img:"foto7.jpeg", texto:`TE VIVER NUNCA FOI SÓ FÁCIL...

MAS SEMPRE VALEU A PENA.` },

{ img:"foto8.jpeg", texto:`PORQUE MESMO NOS DIAS DIFÍCEIS...

ERA VOCÊ QUE EU QUERIA AO MEU LADO.` },

{ img:"foto9.jpeg", texto:`E HOJE, DEPOIS DE TUDO QUE A GENTE VIVEU...

SÓ FICOU MAIS CLARO PRA MIM.` },

{ img:"foto10.jpeg", texto:`EU TE AMO MUITO MUITO MUITO MAIOR QUE O CÉU ❤️

EU ESCOLHO VOCÊ.
HOJE, AMANHÃ E TODOS OS DIAS.

QUER SER MINHA NOIVA? ❤️` }

];

const mapa = document.getElementById("mapa");

let nivelAtual = 0;

// criar níveis
dados.forEach((item, i) => {

  const div = document.createElement("div");
  div.classList.add("nivel");

  if(i === 0){
    div.classList.add("ativo");
  }

  div.innerHTML = `<img src="${item.imgapa.appendChild(div);
});

function abrir(i){

  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = dados[i].img;
  document.getElementById("textoModal").innerText = dados[i].texto;

  nivelAtual = i;
}

function fechar(){

  document.getElementById("modal").style.display = "none";

  // libera próximo nível
  const niveis = document.querySelectorAll(".nivel");

  if(nivelAtual + 1 < niveis.length){
    niveis[nivelAtual + 1].classList.add("ativo");
  }
}

</script>

</body>
</html>
