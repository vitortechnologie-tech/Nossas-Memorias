<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa Jornada ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
    url('fundo.jpg') center/cover no-repeat;
}

.topo {
  color: white;
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
}

/* MAPA */
.mapa {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* LINHAS */
.linha {
  width: 100%;
  display: flex;
  justify-content: center;
}

/* ZIGZAG SUAVE */
.esq {
  justify-content: flex-start;
  padding-left: 8%;
}

.dir {
  justify-content: flex-end;
  padding-right: 8%;
}

/* NÍVEL */
.nivel {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  overflow: hidden;
  margin: 12px 0;
  display: none;
  border: 4px solid white;
  box-shadow: 0 8px 18px rgba(0,0,0,0.4);
  cursor: pointer;
  transition: transform 0.3s;
}

/* ATIVO */
.nivel.ativo {
  display: block;
  animation: pulse 1.2s infinite;
}

.nivel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.nivel:hover {
  transform: scale(1.1);
}

/* ANIMAÇÃO */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.12); }
  100% { transform: scale(1); }
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

/* GLASS */
.caixa {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  padding: 25px;
  border-radius: 20px;
  max-width: 350px;
  color: white;
}

.caixa img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

.caixa p {
  font-size: 18px;
  line-height: 1.5;
  white-space: pre-line;
  text-transform: uppercase;
}

button {
  padding: 12px 20px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="topo">NOSSA HISTÓRIA 💚</div>

<div class="mapa">

  <div class="linha esq"><div class="nivel ativo" onclick="abrir(0)"><img src="foto1.jpeg"></div></div>
  <div class="linha dir"><div class="nivel" onclick="abrir(1)"><img src="foto2.jpeg"></div></div>
  <div class="linha esq"><div class="nivel" onclick="abrir(2)"><img src="foto3.jpeg"></div></div>
  <div class="linha dir"><div class="nivel" onclick="abrir(3)"><img src="foto4.jpeg"></div></div>
  <div class="linha esq"><div class="nivel" onclick="abrir(4)"><img src="foto5.jpeg"></div></div>
  <div class="linha dir"><div class="nivel" onclick="abrir(5)"><img src="foto6.jpeg"></div></div>
  <div class="linha esq"><div class="nivel" onclick="abrir(6)"><img src="foto7.jpeg"></div></div>
  <div class="linha dir"><div class="nivel" onclick="abrir(7)"><img src="foto8.jpeg"></div></div>
  <div class="linha esq"><div class="nivel" onclick="abrir(8)">foto9.jpeg"></div></div>
  <div class="linha dir"><div class="nivel" onclick="abrir(9)"><img src="foto10.jpeg"></div></div>

</div>

<!-- AUDIO CORRIGIDO -->
<audio id="musica" preload="auto" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="modal" id="modal">
  <div class="caixa">
    <img id="imgModal">
    <p id="textoModal"></p>
    <button onclick="fechar()">CONTINUAR</button>
  </div>
</div>

<script>

const textos = [
`QUEM DIRIA QUE ESSA COWGIRL IRIA ENCONTRAR O SEU COWBOY TÃO CEDO`,
`O COWBOYZÃO NÃO VIA A HORA DE TE ENCONTRAR 🤠`,
`ENTRE TANTOS CAMINHOS...
A VIDA ENCONTROU UM JEITO DE CRUZAR A GENTE.`,
`E SEM PERCEBER,
VOCÊ FOI SE TORNANDO TUDO PRA MIM.`,
`NOS MOMENTOS SIMPLES...
NAS RISADAS...

FOI ONDE EU COMECEI A TER CERTEZA.`,
`CADA MOMENTO COM VOCÊ
SEMPRE PARECEU ÚNICO.`,
`TE VIVER NUNCA FOI SÓ FÁCIL...

MAS SEMPRE VALEU A PENA.`,
`PORQUE MESMO NOS DIAS DIFÍCEIS...

ERA VOCÊ QUE EU QUERIA AO MEU LADO.`,
`E HOJE, DEPOIS DE TUDO QUE A GENTE VIVEU...

SÓ FICOU MAIS CLARO PRA MIM.`,
`EU TE AMO MUITO MUITO MUITO MAIOR QUE O CÉU ❤️

EU ESCOLHO VOCÊ.
HOJE, AMANHÃ E TODOS OS DIAS.

QUER SER MINHA NOIVA? ❤️`
];

let atual = 0;
let musicaIniciou = false;

function abrir(i){

  if(!musicaIniciou){
    document.getElementById("musica").play().catch(()=>{});
    musicaIniciou = true;
  }

  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = "foto" + (i+1) + ".jpeg";
  document.getElementById("textoModal").innerText = textos[i];

  atual = i;
}

function fechar(){

  document.getElementById("modal").style.display = "none";

  const niveis = document.querySelectorAll(".nivel");

  if(atual + 1 < niveis.length){
    const next = niveis[atual + 1];
    next.classList.add("ativo");

    next.style.transform = "scale(0)";
    setTimeout(() => {
      next.style.transform = "scale(1)";
    }, 50);
  }
}

</script>

</body>
</html>
