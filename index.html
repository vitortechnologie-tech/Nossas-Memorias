<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa Jornada ❤️</title>

<style>

body {
  margin: 0;
  background: #f1f5f9;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* TOPO */
.topo {
  background: #60a5fa;
  color: white;
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
}

/* MAPA */
.mapa {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 0;
}

/* NÍVEL */
.nivel {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  overflow: hidden;
  margin: 30px 0;
  cursor: pointer;
  border: 4px solid white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

/* zigue-zague */
.nivel:nth-child(odd) {
  transform: translateX(-60px);
}
.nivel:nth-child(even) {
  transform: translateX(60px);
}

.nivel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.nivel:hover {
  transform: scale(1.1);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

/* CAIXA */
.caixa {
  background: white;
  color: black;
  width: 90%;
  max-width: 350px;
  padding: 20px;
  border-radius: 20px;
}

.caixa img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  padding: 10px 20px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

</style>

</head>

<body>

<div class="topo">
  Nossa história 💙
</div>

<div class="mapa">

  <div class="nivel" onclick="abrir(0)"><img src="foto1.jpeg"></div>
  <div class="nivel" onclick="abrir(1)"><img src="foto2.jpeg"></div>
  <div class="nivel" onclick="abrir(2)"><img src="foto3.jpeg"></div>
  <div class="nivel" onclick="abrir(3)"><img src="foto4.jpeg"></div>
  <div class="nivel" onclick="abrir(4)"><img src="foto5.jpeg"></div>
  <div class="nivel" onclick="abrir(5)"><img src="foto6.jpeg"></div>
  <div class="nivel" onclick="abrir(6)"><img src="foto7.jpeg"></div>
  <div class="nivel" onclick="abrir(7)"><img src="foto8.jpeg"></div>
  <div class="nivel" onclick="abrir(8)"><img src="foto9.jpeg"></div>
  <div class="nivel" onclick="abrir(9)"><img src="foto10.jpeg"></div>

</div>

<div class="modal" id="modal">
  <div class="caixa">
    <img id="imgModal">
    <p id="textoModal"></p>
    <button onclick="fechar()">Fechar</button>
  </div>
</div>

<script>

const dados = [

{ img:"foto1.jpeg", texto:`Quem diria que essa cowgirl iria encontrar com esse cowboyzão` },

{ img:"foto2.jpeg", texto:`O cowboyzão aqui não via a hora de te encontrar` },

{ img:"foto3.jpeg", texto:`Entre tantos caminhos… a vida encontrou um jeito de cruzar a gente.` },

{ img:"foto4.jpeg", texto:`E sem perceber, você foi se tornando tudo pra mim.` },

{ img:"foto5.jpeg", texto:`Nos momentos simples… nas risadas…
foi onde eu comecei a ter certeza.` },

{ img:"foto6.jpeg", texto:`Cada momento com você sempre pareceu único.` },

{ img:"foto7.jpeg", texto:`Te viver nunca foi só fácil…
mas sempre valeu a pena.` },

{ img:"foto8.jpeg", texto:`Porque mesmo nos dias difíceis…
era você que eu queria ao meu lado.` },

{ img:"foto9.jpeg", texto:`E hoje, depois de tudo que a gente viveu…
só ficou mais claro pra mim.` },

{ img:"foto10.jpeg", texto:`Eu te amo muito muito muito maior que o céu ❤️

Eu escolho você.
Hoje, amanhã e todos os dias.

Quer noivar comigo? ❤️` }

];

// abrir nível
function abrir(i) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = dados[i].img;
  document.getElementById("textoModal").innerText = dados[i].texto;
}

// fechar
function fechar() {
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
