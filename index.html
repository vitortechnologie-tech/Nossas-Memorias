<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa jornada ❤️</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

.titulo {
  padding: 20px;
  font-size: 22px;
}

.mapa {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
  padding-bottom: 50px;
}

.nivel {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  overflow: hidden;
  border: 4px solid #22c55e;
  cursor: pointer;
  transition: 0.3s;
}

.nivel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.nivel:hover {
  transform: scale(1.1);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.conteudo {
  max-width: 400px;
}

.conteudo img {
  width: 100%;
  border-radius: 20px;
  margin-bottom: 15px;
}

button {
  padding: 10px 20px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="titulo">Nossa história 💙</div>

<div class="mapa">

  <div class="nivel" onclick="abrir(0)">
    foto1.jpeg
  </div>

  <div class="nivel" onclick="abrir(1)">
    foto2.jpeg
  </div>

  <div class="nivel" onclick="abrir(2)">
    foto3.jpeg
  </div>

  <div class="nivel" onclick="abrir(3)">
    foto4.jpeg
  </div>

  <div class="nivel" onclick="abrir(4)">
    foto5.jpeg
  </div>

</div>

<div class="modal" id="modal">
  <div class="conteudo">
    <img id="imgModal">
    <p id="textoModal"></p>
    <button onclick="fechar()">Fechar</button>
  </div>
</div>

<script>

const dados = [
  {
    img: "foto1.jpeg",
    texto: "Foi aqui que tudo começou… e eu nem fazia ideia do quanto você ia mudar a minha vida."
  },
  {
    img: "foto2.jpeg",
    texto: "Entre momentos simples, você foi virando minha pessoa favorita."
  },
  {
    img: "foto3.jpeg",
    texto: "Cada memória com você foi construindo algo muito maior do que eu imaginava."
  },
  {
    img: "foto4.jpeg",
    texto: "E nos dias difíceis… você sempre esteve ali."
  },
  {
    img: "foto5.jpeg",
    texto: "Depois de tudo isso, eu só sei de uma coisa… eu quero você pra vida."
  }
];

function abrir(idx) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = dados[idx].img;
  document.getElementById("textoModal").innerText = dados[idx].texto;
}

function fechar() {
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
