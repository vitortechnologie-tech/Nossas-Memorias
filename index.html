<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .caixa {
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
    }

    button {
      padding: 12px 24px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="caixa">
    <h1>Teste do site</h1>
    <p id="texto">Se clicar no botão e mudar, o JavaScript está funcionando.</p>
    <button id="botao">Continuar</button>
  </div>

  <script>
    document.getElementById("botao").addEventListener("click", function() {
      alert("O botão funcionou!");
      document.getElementById("texto").innerText = "Funcionou! Agora o site está respondendo.";
    });
  </script>

</body>
</html>
