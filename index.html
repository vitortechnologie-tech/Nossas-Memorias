<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa Jornada ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  overflow-x: hidden;
}

/* FUNDO */
.fundo {
  position: fixed;
  inset: 0;
  background-image: url("fundo.jpeg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: -3;
}

/* CAMADA ESCURA */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  z-index: -2;
}

/* TOPO */
.topo {
  color: white;
  padding: 22px 16px 8px;
  font-size: 24px;
  font-weight: 700;
  text-shadow: 0 3px 12px rgba(0,0,0,0.55);
}

.subtitulo {
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  margin-bottom: 12px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.45);
}

/* MAPA */
.mapa {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 18px 0 70px;
  display: flex;
  flex-direction: column;
}

/* LINHAS DO ZIG-ZAG */
.linha {
  width: 100%;
  display: flex;
}

.esq {
  justify-content: flex-start;
  padding-left: 13%;
}

.dir {
  justify-content: flex-end;
  padding-right: 13%;
}

/* BLOCO DO NÍVEL */
.bloco-nivel {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* BOLINHAS */
.nivel {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  overflow: hidden;
  margin: 14px 0 6px;
  display: none;
  border: 4px solid rgba(255,255,255,0.95);
  box-shadow: 0 12px 28px rgba(0,0,0,0.55);
  cursor: pointer;
  background: rgba(255,255,255,0.18);
  position: relative;
}

.nivel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* NÍVEL VISÍVEL */
.nivel.desbloqueado {
  display: block;
}

/* NÍVEL ATUAL */
.nivel.atual {
  animation: pulse 1.25s infinite;
}

/* NÍVEL CONCLUÍDO */
.nivel.concluido {
  opacity: 0.82;
  filter: saturate(0.9);
}

/* ÚLTIMO NÍVEL ESPECIAL */
.nivel.final {
  border-color: #facc15;
  box-shadow:
    0 0 18px rgba(250, 204, 21, 0.9),
    0 12px 30px rgba(0,0,0,0.6);
}

.nivel.final.atual {
  animation: pulseFinal 1.15s infinite;
}

/* LABEL PEQUENA EMBAIXO DA BOLINHA */
.label-nivel {
  display: none;
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 9px;
  border-radius: 999px;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  text-shadow: 0 2px 8px rgba(0,0,0,0.45);
  max-width: 140px;
}

.bloco-nivel.visivel .label-nivel {
  display: inline-block;
}

/* ANIMAÇÕES */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.11); }
  100% { transform: scale(1); }
}

@keyframes pulseFinal {
  0% { 
    transform: scale(1); 
    box-shadow: 0 0 14px rgba(250,204,21,0.75), 0 12px 30px rgba(0,0,0,0.6); 
  }
  50% { 
    transform: scale(1.14); 
    box-shadow: 0 0 30px rgba(250,204,21,1), 0 12px 35px rgba(0,0,0,0.7); 
  }
  100% { 
    transform: scale(1); 
    box-shadow: 0 0 14px rgba(250,204,21,0.75), 0 12px 30px rgba(0,0,0,0.6); 
  }
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.74);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* CARTÃO GLASS */
.caixa {
  width: 100%;
  max-width: 380px;
  padding: 24px;
  border-radius: 28px;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 22px 65px rgba(0,0,0,0.6);
  color: white;
  animation: entradaModal 0.35s ease;
}

.caixa.final {
  border: 1px solid rgba(250,204,21,0.65);
  box-shadow:
    0 0 30px rgba(250,204,21,0.28),
    0 22px 65px rgba(0,0,0,0.7);
}

@keyframes entradaModal {
  from {
    opacity: 0;
    transform: translateY(18px) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.tag {
  display: inline-block;
  margin-bottom: 12px;
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.18);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.titulo-modal {
  margin: 0 0 14px;
  font-size: 18px;
  font-weight: 700;
  text-transform: uppercase;
  text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}

.caixa img {
  width: 100%;
  max-height: 390px;
  object-fit: cover;
  border-radius: 18px;
  margin-bottom: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.36);
}

.caixa p {
  margin: 0;
  font-size: 17px;
  line-height: 1.6;
  white-space: pre-line;
  text-transform: uppercase;
  font-weight: 600;
  text-shadow: 0 2px 10px rgba(0,0,0,0.38);
}

/* PROGRESSO */
.progresso {
  width: 100%;
  height: 6px;
  margin: 18px 0 4px;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(255,255,255,0.2);
}

.barra {
  width: 0%;
  height: 100%;
  background: #22c55e;
  border-radius: 999px;
  transition: width 0.35s ease;
}

.caixa.final .barra {
  background: #facc15;
}

/* BOTÃO */
button {
  margin-top: 22px;
  padding: 12px 24px;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
}

button:hover {
  background: #16a34a;
}

.caixa.final button {
  background: #facc15;
  color: #1f2937;
}

.caixa.final button:hover {
  background: #eab308;
}

/* MOBILE */
@media (max-width: 480px) {
  .topo {
    font-size: 21px;
  }

  .subtitulo {
    font-size: 12px;
  }

  .nivel {
    width: 82px;
    height: 82px;
  }

  .esq {
    padding-left: 11%;
  }

  .dir {
    padding-right: 11%;
  }

  .caixa p {
    font-size: 16px;
  }

  .titulo-modal {
    font-size: 17px;
  }
}
</style>
</head>

<body>

<div class="fundo"></div>
<div class="overlay"></div>

<div class="topo">NOSSA HISTÓRIA 💙</div>
<div class="subtitulo">DESBLOQUEIE CADA MEMÓRIA</div>

<div class="mapa">

  <div class="linha esq">
    <div class="bloco-nivel visivel">
      <div class="nivel desbloqueado atual" onclick="abrir(0)">
        <img src="foto1.jpeg" alt="Foto 1">
      </div>
      <div class="label-nivel">MEMÓRIA 1</div>
    </div>
  </div>

  <div class="linha dir">
    <div class="bloco-nivel">
      <div class="nivel" onclick="abrir(1)">
        <img src="foto2.jpeg" alt="Foto 2">
      </div>
      <div class="label-nivel">MEMÓRIA 2</div>
    </div>
  </div>

  <div class="linha esq">
    <div class="bloco-nivel">
      <div class="nivel" onclick="abrir(2)">
        <img src="foto3.jpeg" alt="Foto 3">
      </div>
      <div class="label-nivel">MEMÓRIA 3</div>
    </div>
  </div>

  <div class="linha dir">
    <div class="bloco-nivel">
      <div class="nivel" onclick="abrir(3)">
        <img src="foto4.jpeg" alt="Foto 4">
      </div>
      <div class="label-nivel">MEMÓRIA 4</div>
    </div>
  </div>

  <div class="linha esq">
    <div class="bloco-nivel">
      <div class="nivel" onclick="abrir(4)">
        <img src="foto5.jpeg" alt="Foto 5">
      </div>
      <div class="label-nivel">MEMÓRIA 5</div>
    </div>
  </div>

  <div class="linha dir">
    <div class="bloco-nivel">
      <div class="nivel" onclick="abrir(5)">
        <img src="foto6.jpeg" alt="Foto 6">
      </div>
      <div class="label-nivel">MEMÓRIA 6</div>
    </div>
  </div>

  <div class="linha esq">
    <div class="bloco-nivel">
      <div class="nivel" onclick="abrir(6)">
        <img src="foto7.jpeg" alt="Foto 7">
      </div>
      <div class="label-nivel">MEMÓRIA 7</div>
    </div>
  </div>

  <div class="linha dir">
    <div class="bloco-nivel">
      <div class="nivel" onclick="abrir(7)">
        <img src="foto8.jpeg" alt="Foto 8">
      </div>
      <div class="label-nivel">MEMÓRIA 8</div>
    </div>
  </div>

  <div class="linha esq">
    <div class="bloco-nivel">
      <div class="nivel" onclick="abrir(8)">
        <img src="foto9.jpeg" alt="Foto 9">
      </div>
      <div class="label-nivel">MEMÓRIA 9</div>
    </div>
  </div>

  <div class="linha dir">
    <div class="bloco-nivel">
      <div class="nivel final" onclick="abrir(9)">
        <img src="foto10.jpeg" alt="Foto 10">
      </div>
      <div class="label-nivel">PRA SEMPRE</div>
    </div>
  </div>

</div>

<audio id="musica" preload="auto" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="modal" id="modal">
  <div class="caixa" id="caixaModal">
    <div class="tag" id="tagModal">MEMÓRIA 1</div>
    <h2 class="titulo-modal" id="tituloModal"></h2>
    <img id="imgModal" alt="Foto da nossa história">
    <p id="textoModal"></p>

    <div class="progresso">
      <div class="barra" id="barra"></div>
    </div>

    <button id="botaoModal" onclick="fechar()">CONTINUAR</button>
  </div>
</div>

<script>
const titulos = [
  "A COWGIRL",
  "O COWBOY",
  "O ENCONTRO",
  "O COMEÇO",
  "AS RISADAS",
  "OS MOMENTOS",
  "OS DESAFIOS",
  "A ESCOLHA",
  "A CERTEZA",
  "O PRÓXIMO CAPÍTULO"
];

const textos = [
  "QUEM DIRIA QUE ESSA COWGIRL IRIA ENCONTRAR O SEU COWBOY TÃO CEDO",

  "O COWBOYZÃO NÃO VIA A HORA DE TE ENCONTRAR 🤠",

  "ENTRE TANTOS CAMINHOS...\nA VIDA ENCONTROU UM JEITO DE CRUZAR A GENTE.",

  "E SEM PERCEBER,\nVOCÊ FOI SE TORNANDO TUDO PRA MIM.",

  "NOS MOMENTOS SIMPLES...\nNAS RISADAS...\n\nFOI ONDE EU COMECEI A TER CERTEZA.",

  "CADA MOMENTO COM VOCÊ\nSEMPRE PARECEU ÚNICO.",

  "TE VIVER NUNCA FOI SÓ FÁCIL...\n\nMAS SEMPRE VALEU A PENA.",

  "PORQUE MESMO NOS DIAS DIFÍCEIS...\n\nERA VOCÊ QUE EU QUERIA AO MEU LADO.",

  "E HOJE, DEPOIS DE TUDO QUE A GENTE VIVEU...\n\nSÓ FICOU MAIS CLARO PRA MIM.",

  "EU TE AMO MUITO MUITO MUITO MAIOR QUE O CÉU ❤️\n\nEU ESCOLHO VOCÊ.\nHOJE, AMANHÃ E TODOS OS DIAS.\n\nQUER SER MINHA NOIVA? ❤️"
];

let atual = 0;
let musicaIniciou = false;

function iniciarMusica() {
  if (!musicaIniciou) {
    const audio = document.getElementById("musica");
    audio.volume = 0.65;
    audio.play().catch(() => {});
    musicaIniciou = true;
  }
}

function abrir(i) {
  iniciarMusica();

  const modal = document.getElementById("modal");
  const caixa = document.getElementById("caixaModal");
  const tag = document.getElementById("tagModal");
  const titulo = document.getElementById("tituloModal");
  const imagem = document.getElementById("imgModal");
  const texto = document.getElementById("textoModal");
  const barra = document.getElementById("barra");
  const botao = document.getElementById("botaoModal");

  atual = i;

  modal.style.display = "flex";

  imagem.src = "foto" + (i + 1) + ".jpeg";
  texto.innerText = textos[i];
  titulo.innerText = titulos[i];

  if (i === textos.length - 1) {
    caixa.classList.add("final");
    tag.innerText = "PRA SEMPRE";
    botao.innerText = "❤️";
  } else {
    caixa.classList.remove("final");
    tag.innerText = "MEMÓRIA " + (i + 1);
    botao.innerText = "CONTINUAR";
  }

  const progresso = ((i + 1) / textos.length) * 100;
  barra.style.width = progresso + "%";
}

function fechar() {
  document.getElementById("modal").style.display = "none";

  const niveis = document.querySelectorAll(".nivel");
  const blocos = document.querySelectorAll(".bloco-nivel");

  niveis[atual].classList.remove("atual");
  niveis[atual].classList.add("concluido");

  if (atual + 1 < niveis.length) {
    niveis[atual + 1].classList.add("desbloqueado");
    niveis[atual + 1].classList.add("atual");
    blocos[atual + 1].classList.add("visivel");
  }
}
</script>

</body>
</html>
