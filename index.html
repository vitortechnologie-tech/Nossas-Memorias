<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa Jornada ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f1f5f9;
  font-family: 'Poppins', sans-serif;
  text-align: center;
}

/* TOPO */
.topo {
  background: #60a5fa;
  color: white;
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
}

/* MAPA */
.mapa {
  padding: 30px 0;
}

/* ITEM */
.item {
  width: 100%;
  display: flex;
  margin: 25px 0;
}

/* POSIÇÃO */
.esq {
  justify-content: flex-start;
  padding-left: 12%;
}

.dir {
  justify-content: flex-end;
  padding-right: 12%;
}

/* BOLINHA */
.nivel {
  width: 85px;
  height: 85px;
  border-radius: 50%;
  overflow: hidden;
  border: 4px solid white;
  cursor: pointer;
  background: #e5e7eb;
  box-shadow: 0 10px 20px rgba(0,0,0,0.25);
  transition: 0.25s;
}

.nivel:hover {
  transform: scale(1.08);
}

.nivel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* CAIXA */
.caixa {
  background: white;
  border-radius: 20px;
  padding: 25px;
  max-width: 350px;
  text-align: center;
}

/* FOTO */
.caixa img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

/* TEXTO */
.caixa p {
  font-size: 18px;
  line-height: 1.6;
  white-space: pre-line;
  font-weight: 500;
  text-transform: uppercase;
}

/* BOTAO */
button {
  padding: 12px 20px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

</style>

</head>

<body>

<div class="topo">
  NOSSA HISTÓRIA 💙
</div>

<div class="mapa">

  <div class="item esq"><div class="nivel" onclick="abrir(0)">
    <img src="foto1.jpeg">
  </div></div>

  <div class="item dir"><div class="nivel" onclick="abrir(1)">
    <img src="foto2.jpeg">
  </div></div>

  <div class="item esq"><div class="nivel" onclick="abrir(2)">
    <img src="foto3.jpeg">
  </div></div>

  <div class="item dir"><div class="nivel" onclick="abrir(3)">
    <img src="foto4.jpeg">
  </div></div>

  <div class="item esq"><div class="nivel" onclick="abrir(4)">
    <img src="foto5.jpeg">
  </div></div>

  <div class="item dir"><div class="nivel" onclick="abrir(5)">
    <img src="foto6.jpeg">
  </div></div>

  <div class="item esq"><div class="nivel" onclick="abrir(6)">
    <img src="foto7.jpeg">
  </div></div>

  <div class="item dir"><div class="nivel" onclick="abrir(7)">
    <img src="foto8.jpeg">
  </div></div>

  <div class="item esq"><div class="nivel" onclick="abrir(8)">
    <img src="foto9.jpeg">
  </div></div>

  <div class="item dir"><div class="nivel" onclick="abrir(9)">
    <img src="foto10.jpeg">
  </div></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="caixa">
    <img id="imgModal">
    <p id="textoModal"></p>
    <button onclick="fechar()">CONTINUAR</button>
  </div>
</div>

<script>

const dados = [

{ img:"foto1.jpeg", texto:`QUEM DIRIA QUE ESSA COWGIRL IRIA ENCONTRAR O SEU COWBOY TÃO CEDO` },

{ img:"foto2.jpeg", texto:`O COWBOY 🤠` },

{ img:"foto3.jpeg", texto:`ENTRE TANTOS CAMINHOS…
A VIDA ENCONTROU UM JEITO DE CRUZAR A GENTE.` },

{ img:"foto4.jpeg", texto:`E SEM PERCEBER,
VOCÊ FOI SE TORNANDO TUDO PRA MIM.` },

{ img:"foto5.jpeg", texto:`NOS MOMENTOS SIMPLES…
NAS RISADAS…

FOI ONDE EU COMECEI A TER CERTEZA.` },

{ img:"foto6.jpeg", texto:`CADA MOMENTO COM VOCÊ
SEMPRE PARECEU ÚNICO.` },

{ img:"foto7.jpeg", texto:`TE VIVER NUNCA FOI SÓ FÁCIL…

MAS SEMPRE VALEU A PENA.` },

{ img:"foto8.jpeg", texto:`PORQUE MESMO NOS DIAS DIFÍCEIS…

ERA VOCÊ QUE EU QUERIA AO MEU LADO.` },

{ img:"foto9.jpeg", texto:`E HOJE, DEPOIS DE TUDO QUE A GENTE VIVEU…

SÓ FICOU MAIS CLARO PRA MIM.` },

{ img:"foto10.jpeg", texto:`EU TE AMO MUITO MUITO MUITO MAIOR QUE O CÉU ❤️

EU ESCOLHO VOCÊ.
HOJE, AMANHÃ E TODOS OS DIAS.

QUER SER MINHA NOIVA? ❤️` }

];

function abrir(i) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = dados[i].img;
  document.getElementById("textoModal").innerText = dados[i].texto;
}

function fechar() {
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
``
