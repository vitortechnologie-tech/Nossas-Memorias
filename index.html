<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa Jornada ❤️</title>

<style>

body {
  margin: 0;
  background: #f1f5f9;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* TOPO */
.topo {
  background: #60a5fa;
  color: white;
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
}

/* MAPA */
.mapa {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 0;
}

/* LINHA CENTRAL */
.linha {
  position: absolute;
  width: 6px;
  height: 100%;
  background: #22c55e;
  left: 50%;
  transform: translateX(-50%);
  top: 80px;
  z-index: -1;
}

/* NÍVEL */
.nivel {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  overflow: hidden;
  margin: 30px 0;
  cursor: pointer;
  border: 4px solid white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

/* efeito zigue-zague */
.nivel:nth-child(odd) {
  transform: translateX(-60px);
}

.nivel:nth-child(even) {
  transform: translateX(60px);
}

.nivel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.nivel:hover {
  transform: scale(1.1);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

/* CAIXA */
.caixa {
  background: white;
  color: black;
  width: 90%;
  max-width: 350px;
  padding: 20px;
  border-radius: 20px;
}

/* IMAGEM */
.caixa img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  padding: 10px 20px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

</style>

</head>

<body>

<div class="topo">
  Nossa história 💙
</div>

<div class="mapa">

  <div class="nivel" onclick="abrir(0)">
    <img src="foto1.jpeg">
  </div>

  <div class="nivel" onclick="abrir(1)">
    <img src="foto2.jpeg">
  </div>

  <div class="nivel" onclick="abrir(2)">
    <img src="foto3.jpeg">
  </div>

  <div class="nivel" onclick="abrir(3)">
    <img src="foto4.jpeg">
  </div>

  <div class="nivel" onclick="abrir(4)">
    <img src="foto5.jpeg">
  </div>

  <div class="nivel" onclick="abrirFinal()">
    <img src="foto5.jpeg">
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

  <div class="caixa">
    <img id="imgModal">
    <p id="textoModal"></p>

    <button onclick="fechar()">Fechar</button>
  </div>

</div>

<script>

// DADOS
const dados = [
  {
    img: "foto1.jpeg",
    texto: "Foi aqui que tudo começou…"
  },
  {
    img: "foto2.jpeg",
    texto: "Você foi virando minha pessoa favorita."
  },
  {
    img: "foto3.jpeg",
    texto: "Cada momento com você ficou especial."
  },
  {
    img: "foto4.jpeg",
    texto: "Mesmo nos dias difíceis… sempre foi você."
  },
  {
    img: "foto5.jpeg",
    texto: "E depois de tudo isso…"
  }
];

// ABRIR NÍVEL
function abrir(i) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = dados[i].img;
  document.getElementById("textoModal").innerText = dados[i].texto;
}

// FINAL
function abrirFinal() {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = "foto5.jpeg";
  document.getElementById("textoModal").innerText =
    "EU TE AMO MUITO MUITO MUITO MAIOR QUE O CÉU ❤️";
}

// FECHAR
function fechar() {
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
