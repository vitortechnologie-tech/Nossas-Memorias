<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa Jornada ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f1f5f9;
  font-family: 'Poppins', sans-serif;
  text-align: center;
}

.topo {
  background: #60a5fa;
  color: white;
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
}

.mapa {
  padding: 40px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* níveis ocultos */
.nivel {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  overflow: hidden;
  margin: 25px 0;
  cursor: pointer;
  border: 4px solid white;
  box-shadow: 0 10px 20px rgba(0,0,0,0.25);
  display: none;
}

.nivel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.nivel.ativo {
  display: block;
}

.nivel:hover {
  transform: scale(1.1);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

.caixa {
  background: white;
  padding: 25px;
  border-radius: 20px;
  max-width: 350px;
}

.caixa img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

.caixa p {
  font-size: 18px;
  line-height: 1.6;
  white-space: pre-line;
  text-transform: uppercase;
}

button {
  padding: 12px 20px;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

</style>

</head>

<body>

<div class="topo">NOSSA HISTÓRIA 💙</div>

<div class="mapa">

  <div class="nivel ativo" onclick="abrir(0)"><img src="foto1.jpeg"></div>
  <div class="nivel" onclick="abrir(1)"><img src="foto2.jpeg"></div>
  <div class="nivel" onclick="abrir(2)"><img src="foto3.jpeg"></div>
  <div class="nivel" onclick="abrir(3)"><img src="foto4.jpeg"></div>
  <div class="nivel" onclick="abrir(4)"><img src="foto5.jpeg"></div>
  <div class="nivel" onclick="abrir(5)"><img src="foto6.jpeg"></div>
  <div class="nivel" onclick="abrir(6)"><img src="foto7.jpeg"></div>
  <div class="nivel" onclick="abrir(7)"><img src="foto8.jpeg"></div>
  <div class="nivel" onclick="abrir(8)"><img src="foto9.jpeg"></div>
  <div class="nivel" onclick="abrir(9)"><img src="foto10.jpeg"></div>

</div>

<div class="modal" id="modal">
  <div class="caixa">
    <img id="imgModal">
    <p id="textoModal"></p>
    <button onclick="fechar()">CONTINUAR</button>
  </div>
</div>

<script>

const textos = [

`QUEM DIRIA QUE ESSA COWGIRL IRIA ENCONTRAR O SEU COWBOY TÃO CEDO`,

`O COWBOYZÃO NÃO VIA A HORA DE TE ENCONTRAR 🤠`,

`ENTRE TANTOS CAMINHOS...
A VIDA ENCONTROU UM JEITO DE CRUZAR A GENTE.`,

`E SEM PERCEBER,
VOCÊ FOI SE TORNANDO TUDO PRA MIM.`,

`NOS MOMENTOS SIMPLES...
NAS RISADAS...

FOI ONDE EU COMECEI A TER CERTEZA.`,

`CADA MOMENTO COM VOCÊ
SEMPRE PARECEU ÚNICO.`,

`TE VIVER NUNCA FOI SÓ FÁCIL...

MAS SEMPRE VALEU A PENA.`,

`PORQUE MESMO NOS DIAS DIFÍCEIS...

ERA VOCÊ QUE EU QUERIA AO MEU LADO.`,

`E HOJE, DEPOIS DE TUDO QUE A GENTE VIVEU...

SÓ FICOU MAIS CLARO PRA MIM.`,

`EU TE AMO MUITO MUITO MUITO MAIOR QUE O CÉU ❤️

EU ESCOLHO VOCÊ.
HOJE, AMANHÃ E TODOS OS DIAS.

QUER SER MINHA NOIVA? ❤️`

];

let atual = 0;

function abrir(i){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = "foto" + (i+1) + ".jpeg";
  document.getElementById("textoModal").innerText = textos[i];
  atual = i;
}

function fechar(){
  document.getElementById("modal").style.display = "none";

  const niveis = document.querySelectorAll(".nivel");

  if(atual + 1 < niveis.length){
    niveis[atual + 1].classList.add("ativo");
  }
}

</script>

</body>
</html>
