<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pra você ❤️</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  padding: 18px;
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow-x: hidden;
}

.fundo {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at top, rgba(236, 72, 153, 0.25), transparent 35%),
    linear-gradient(135deg, #0f172a, #1e293b);
  background-size: cover;
  background-position: center;
  transition: background-image 0.8s ease;
  z-index: -2;
}

.fundo::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.55);
  backdrop-filter: blur(2px);
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 26px 22px;
  background: rgba(0, 0, 0, 0.58);
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(10px);
  animation: aparecer 0.8s ease;
}

@keyframes aparecer {
  from {
    opacity: 0;
    transform: translateY(18px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.badge {
  display: inline-block;
  padding: 6px 12px;
  margin-bottom: 14px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.12);
  color: #e2e8f0;
  font-size: 13px;
}

h1 {
  margin: 0 0 18px;
  font-size: 26px;
  line-height: 1.2;
}

#foto {
  display: none;
  width: 100%;
  max-height: 310px;
  object-fit: cover;
  border-radius: 18px;
  margin-bottom: 18px;
  opacity: 0;
  transform: scale(0.98);
  transition: opacity 0.6s ease, transform 0.6s ease;
  box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
}

#foto.mostrar {
  opacity: 1;
  transform: scale(1);
}

#texto {
  margin: 0;
  min-height: 105px;
  font-size: 20px;
  line-height: 1.45;
  transition: opacity 0.4s ease;
}

#texto.final {
  font-size: 23px;
  font-weight: bold;
  line-height: 1.35;
  color: #fff;
  text-shadow: 0 0 18px rgba(236, 72, 153, 0.45);
}

.progresso {
  width: 100%;
  height: 6px;
  margin: 18px 0 12px;
  background: rgba(255, 255, 255, 0.18);
  border-radius: 999px;
  overflow: hidden;
}

#barra {
  width: 0%;
  height: 100%;
  background: #22c55e;
  border-radius: 999px;
  transition: width 0.4s ease;
}

#contador {
  margin-top: 12px;
  font-size: 14px;
  color: #cbd5e1;
}

button {
  padding: 12px 24px;
  margin-top: 20px;
  background-color: #22c55e;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #16a34a;
}

@media (max-width: 480px) {
  h1 {
    font-size: 23px;
  }

  #texto {
    font-size: 18px;
  }

  #texto.final {
    font-size: 21px;
  }

  .container {
    padding: 24px 18px;
  }
}
</style>
</head>

<body>

<div id="fundo" class="fundo"></div>

<div class="container">
  <div class="badge">Nossa história</div>

  <h1>Pra você, minha princesa ❤️</h1>

  <img id="foto" src="" alt="Nossa foto">

  <p id="texto">Tenho uma coisa simples pra te mostrar...</p>

  <div class="progresso">
    <div id="barra"></div>
  </div>

  <div id="contador"></div>

  <button id="botao" onclick="proximo()">Continuar</button>
</div>

<audio id="musica" preload="auto" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>
